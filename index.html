<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream - サポート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    a {
      color: #fff;
      text-decoration: underline;
    }
    .email-btn {
      display: inline-block;
      background: #fff;
      color: #000;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dream</h1>
    <p>目標達成をサポートするシンプルなアプリです。</p>
    <p>ご質問・ご要望・不具合報告は下記までお気軽にご連絡ください。</p>
    <a href="mailto:your-email@example.com" class="email-btn">お問い合わせ</a>
  </div>
</body>
</html>
